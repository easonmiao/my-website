<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片测试 - HooMee</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #f3f4f6; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; }
        .item { background: #fff; padding: 1rem; border-radius: 8px; text-align: center; }
        .item img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; background: #e5e7eb; }
        .item p { font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
        .ok { color: green; font-weight: bold; }
        .err { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🖼️ 图片加载测试页</h1>
    <p>如果图片显示正常，说明上传成功。如果显示灰色方块，说明图片未找到。</p>
    <div class="grid">
        <div class="item"><img src="images/xhs/01.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>01.jpg</p></div>
        <div class="item"><img src="images/xhs/02.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>02.jpg</p></div>
        <div class="item"><img src="images/xhs/03.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>03.jpg</p></div>
        <div class="item"><img src="images/xhs/04.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>04.jpg</p></div>
        <div class="item"><img src="images/xhs/05.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>05.jpg</p></div>
        <div class="item"><img src="images/xhs/06.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>06.jpg</p></div>
        <div class="item"><img src="images/xhs/07.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>07.jpg</p></div>
        <div class="item"><img src="images/xhs/08.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>08.jpg</p></div>
        <div class="item"><img src="images/xhs/09.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>09.jpg</p></div>
        <div class="item"><img src="images/xhs/10.jpg" onload="this.nextElementSibling.className='ok';this.nextElementSibling.textContent='✅ 正常'" onerror="this.nextElementSibling.className='err';this.nextElementSibling.textContent='❌ 失败'"><p>10.jpg</p></div>
    </div>
</body>
</html>
