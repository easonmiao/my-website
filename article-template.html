<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章标题 · 资讯 · HooMee Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        if(localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)){
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        /* 文章专属排版 */
        .article-header { padding: 8rem 1.5rem 3rem; text-align: center; background: linear-gradient(135deg, #fef2f2 0%, #f3f4f6 100%); }
        .article-meta { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tag { padding: 4px 14px; background: #fff; border: 1px solid #e5e7eb; border-radius: 100px; font-size: 0.8rem; font-weight: 600; color: #ff4757; }
        .dark .tag { background: #1f2937; border-color: #374151; }
        .article-title { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; max-width: 800px; margin: 0 auto 1rem; }
        .article-cover { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
        .article-cover img { width: 100%; height: 400px; object-fit: cover; border-radius: 1rem; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15); }
        .article-body { max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem; }
        .article-content h2 { font-size: 1.6rem; margin: 3rem 0 1.25rem; border-bottom: 2px solid #ff4757; display: inline-block; padding-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <header class="article-header">
        <div class="article-meta">
            <span class="tag">资讯</span>
            <span class="date">2026年5月20日</span>
        </div>
        <h1 class="article-title">这里填写你的大标题</h1>
    </header>

    <div class="article-cover">
        <img src="images/placeholder.svg" alt="文章封面">
    </div>

    <article class="article-body">
        <div class="article-content">
            <p>这里是文章正文开头段落。</p>
            <h2>一、第一部分标题</h2>
            <p>这里是第一部分的内容。可以包含多个段落，详细阐述观点。</p>
            <blockquote>这是一段重点引用的内容。</blockquote>
        </div>
    </article>

    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script>
</body>
</html>
