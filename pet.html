<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌宠 · HooMee Coffee</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        if(localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)){
            document.documentElement.classList.add('dark');
        }
    </script>
    
    <style>
        .page-header { padding-top: 8rem; padding-bottom: 3rem; text-align: center; }
        .page-header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 0.5rem; }
        .page-header p { color: #6b7280; font-size: 1.1rem; }
        
        .host-card { display: flex; align-items: center; gap: 1.5rem; background: #fff; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 3rem; }
        .dark .host-card { background: #1f2937; border-color: #374151; }
        
        .host-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #ffe66d; }
        .host-info h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; }
        .host-info p { color: #6b7280; font-size: 0.9rem; }
        
        .tag { display: inline-block; padding: 4px 12px; background: #fefce8; color: #ca8a04; font-size: 0.8rem; font-weight: 600; border-radius: 100px; margin-top: 0.5rem; }
        .dark .tag { background: rgba(202, 138, 4, 0.2); color: #fde047; }

        /* ================= 方案一：CSS 原生瀑布流落地实现 ================= */
        .masonry-wrapper {
            column-count: 3;      /* 默认桌面端排成 3 列 */
            column-gap: 1.5rem;   /* 列与列之间的间距 */
            width: 100%;
        }
        
        .post-card {
            break-inside: avoid;  /* 极其重要：防止卡片在分页或换列时被截断拆开 */
            display: inline-block; /* 配合 columns 属性必须设为行内块 */
            width: 100%;
            margin-bottom: 1.5rem; /* 卡片上下的间距 */
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .post-img-wrap {
            width: 100%;
            height: auto;        /* 取消固定高度，让图片高度由自身长宽比决定 */
            overflow: hidden;
            background: #f3f4f6;
        }
        .dark .post-img-wrap { background: #111827; }

        .post-img-wrap img {
            width: 100%;
            height: auto;        /* 彻底放开高度 */
            object-fit: contain; /* 确保图片完整保留原始长宽比，绝不裁剪 */
            display: block;
        }
        
        .post-body { padding: 1rem; text-align: left; }
        .post-body h3 { font-size: 0.95rem; font-weight: 600; line-height: 1.4; margin-top: 0.25rem; }
        .post-date { font-size: 0.85rem; color: #ff4757; font-weight: 600; }

        /* 响应式断点适配 */
        @media (max-width: 900px) {
            .masonry-wrapper { column-count: 2; } /* 平板或小屏变 2 列 */
        }
        @media (max-width: 600px) {
            .masonry-wrapper { column-count: 1; } /* 手机端单列信息流 */
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="page-header">
        <div class="container">
            <h1>萌宠</h1>
            <p>猫咪日常与治愈瞬间，每一个毛茸茸的时刻都值得记录</p>
        </div>
    </div>

    <section style="padding-top: 0;">
        <div class="container">
            <div class="host-card">
                <img src="images/BanBan.png" alt="BanBan" class="host-avatar">
                <div class="host-info">
                    <h3>BanBan</h3>
                    <p>萌宠栏目主理人（一只虎斑德文猫）。粘人精、淘气鬼、好奇狗。来杯斑斑咖啡吧 ☕️</p>
                    <span class="tag">萌宠</span>
                </div>
            </div>

            <div class="section-header">
                <span class="section-label">Latest</span>
                <h2 class="section-title">斑斑的小红书搬运站</h2>
            </div>
            
            <div class="masonry-wrapper">
                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/01.jpg" alt="你们德文都这么魔丸吗😅" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 42</span><h3>你们德文都这么魔丸吗😅</h3></div>
                </article>

                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/02.jpg" alt="咪的配得感" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 21</span><h3>咪的配得感</h3></div>
                </article>

                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/03.jpg" alt="穿上衣服也是小淑女一枚啦" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1495360010541-f48722b34f7d?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 10</span><h3>穿上衣服也是小淑女一枚啦</h3></div>
                </article>

                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/04.jpg" alt="今天终于和我贴贴了" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1513245543132-31f507417b26?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 10</span><h3>今天终于和我贴贴了</h3></div>
                </article>

                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/05.jpg" alt="小咪就是用来暖脚的对吧" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1543852786-1cf6624b9987?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 9</span><h3>小咪就是用来暖脚的对吧</h3></div>
                </article>

                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/06.jpg" alt="需要抱抱的小老虎" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 7</span><h3>需要抱抱的小老虎</h3></div>
                </article>

                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/07.jpg" alt="你们的猫咪会这样睡吗" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1519052537078-e6302a4968d4?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 6</span><h3>你们的猫咪会这样睡吗</h3></div>
                </article>

                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/08.jpg" alt="【樱花季的喵喵探班】" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1513245543132-31f507417b26?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 3</span><h3>【樱花季的喵喵探班】</h3></div>
                </article>

                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/09.jpg" alt="甜品 咖啡 猫 治愈一切" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1543852786-1cf6624b9987?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 3</span><h3>甜品 咖啡 猫 治愈一切</h3></div>
                </article>

                <article class="post-card">
                    <div class="post-img-wrap">
                        <img src="images/xhs/10.jpg" alt="这6盆多少钱拿下？" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=600&h=400&fit=crop'">
                    </div>
                    <div class="post-body"><span class="post-date">❤️ 2</span><h3>这6盆多少钱拿下？</h3></div>
                </article>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script>
</body>
</html>
