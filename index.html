<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HooMee Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        if(localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)){
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        /* 首页专属 Hero 区样式 (不污染全局) */
        .hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6rem 1rem 4rem; overflow: hidden; }
        .avatar-wrap { position: relative; width: 180px; height: 180px; margin-bottom: 2rem; z-index: 10; }
        .avatar-bg { position: absolute; inset: 0; background: #ff6b6b; border-radius: 50%; z-index: 1; transition: background-color 0.5s ease; }
        .avatar-img { position: relative; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; z-index: 2; display: block; }
        .hero h1 { font-size: 3rem; font-weight: 800; color: #374151; margin-bottom: 0.75rem; z-index: 10; text-align: center; }
        .dark .hero h1 { color: #f9fafb; }
        .typewriter { font-size: 1.25rem; font-weight: 500; color: #6b7280; margin-bottom: 1.5rem; z-index: 10; min-height: 1.8rem; }
        .dark .typewriter { color: #9ca3af; }
        .cursor { display: inline-block; width: 2px; height: 1.2em; background: #6b7280; margin-left: 2px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        /* Blob 动画简略版 */
        .shape { position: absolute; z-index: 1; opacity: 0.7; pointer-events: none; }
        .blob-blue { width: 80px; height: 80px; background: #93c5fd; border-radius: 40% 60% 60% 40% / 60% 40% 60% 40%; bottom: 8%; left: 6%; animation: float 8s ease-in-out infinite, rotate 20s linear infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <section class="hero">
        <div class="shape blob-blue"></div>
        <div class="avatar-wrap">
            <div class="avatar-bg" id="avatar-bg"></div>
            <img src="images/EMiAO.png" alt="头像" class="avatar-img" id="avatar-img">
        </div>
        <h1>HooMee Coffee</h1>
        <div class="typewriter">
            <span id="type-text"></span><span class="cursor"></span>
        </div>
    </section>

    <section id="menu">
        <div class="container">
            <div class="section-header">
                <span class="section-label">Menu</span>
                <h2 class="section-title">栏目菜单</h2>
            </div>
            <div class="grid-3">
                <div class="card">
                    <div class="card-icon">📰</div><h3>资讯</h3><p>追踪科技前沿，分享数码好物。</p>
                </div>
                </div>
        </div>
    </section>

    <section id="works" style="background: #fff;">
        <div class="container">
            <div class="section-header">
                <span class="section-label">Recent Works</span>
                <h2 class="section-title">最近作品</h2>
            </div>
            <div class="grid-2">
                <div class="work-card">
                    <img src="images/work1.jpg" onerror="this.src='https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&h=400&fit=crop'">
                    <div class="work-body"><h3>手冲咖啡入门指南</h3><p>从选豆到注水的完整记录与心得。</p></div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
</body>
</html>
